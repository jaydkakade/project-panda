<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Project Panda 🐼</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
       href="https://fonts.gstatic.com"
       crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Scene 1 -->
   <section id="scene1" class="scene">

    <!-- Background -->
    <div class="background">

        <img src="assets/images/background/background.png"
             class="background-image">

        <img src="assets/images/background/moon.png"
             class="moon">

        <img src="assets/images/background/cloud1.png"
             class="cloud cloud1">

        <img src="assets/images/background/cloud2.png"
             class="cloud cloud2">

        <img src="assets/images/background/cloud3.png"
             class="cloud cloud3">

        <!-- Stars will be generated here -->
        <div id="stars"></div>

    </div>

   <!-- Character -->

<div class="character">

    <img
        src="assets/images/cat/sleeping-cat.png"
        class="sleeping-cat"
        alt="Sleeping Cat">

    <div id="fireflies"></div>

</div>

<div id="magicBurst"></div>

<div class="intro-text">

    <p id="dialogueText"></p>

</div>

<!-- Button -->

<div class="intro">

    <button id="startButton">
        
        <div class="button-glow"></div>

        <img
            src="assets/images/ui/button.png"
            class="button-image"
            alt="Button">

        <span>Start Adventure</span>

    </button>

</div>

</section>

<section id="scene2" class="scene hidden">

    <!-- Forest Background -->
    <div class="background">

        <img
            src="assets/images/background/forest.png"
            class="background-image"
            alt="Forest">

    </div>

    <!-- Panda -->

    <div class="panda-container">

        <img
            src="assets/images/panda/standing.png"
            id="panda"
            alt="Panda">

    </div>


    <!-- Dialogue -->

    <div id="dialogue" class="panda-dialogue">

        <h2 id="pandaText"></h2>

        <button id="friendButton" class="hidden">
            ✨ One Little Thing...
        </button>

    </div>

</section>

<section id="scene3" class="scene hidden">

    <!-- Background -->

    <div class="scene3-bg">

        <img
            src="assets/images/background/friendship-bg.png"
            class="scene3-background">

    </div>

    <!-- Giant Panda -->

    <div class="friendship-panda">

        <img
            id="friendshipPanda"
            src="assets/images/panda/thinking.png">

        <div id="reactionBubble" class="reaction-bubble hidden">

        <p id="reactionText"></p>

</div>

    </div>

    <!-- UI -->

    <div class="friendship-ui">

        <div class="friendship-header">

            <h1>

                ✨ Friendship Test ✨

            </h1>

            <div class="friendship-divider">

                <span></span>

                ❤️

                <span></span>

            </div>

        </div>

        <h2 id="questionText">

            If I ever felt sad...

            <br>

            what would you do?

        </h2>

        <div id="answerButtons">

            <!-- Cards generated later -->

        </div>

    </div>

</section>

<!-- ===================================================
                    SCENE 4
==================================================== -->

<section id="scene4" class="scene hidden">

    <!-- ===========================
            BACKGROUND
    ============================ -->

    <div class="birthday-bg"></div>

    <div class="birthday-overlay"></div>


    <canvas id="confettiCanvas"></canvas>

    <img src="assets/images/decorations/sparkles.png"
     class="sparkles sparkle1"
     alt="Sparkles">

<img src="assets/images/decorations/sparkles.png"
     class="sparkles sparkle2"
     alt="Sparkles">

<img src="assets/images/decorations/sparkles.png"
     class="sparkles sparkle3"
     alt="Sparkles">

<img src="assets/images/decorations/sparkles.png"
     class="sparkles sparkle4"
     alt="Sparkles">

    <img
        src="assets/images/decorations/balloons.png"
        class="balloon balloon-left"
        alt="Balloon">

    <img
        src="assets/images/decorations/balloons.png"
        class="balloon balloon-right"
        alt="Balloon">

    <!-- ===========================
            CONTENT
    ============================ -->

    <div id="birthdayLayout">

        <!-- TEXT -->

        <header id="birthdayHero">

            <img

                src="assets/images/background/birthday_text.png"

                id="birthdayText"

                alt="Happy Birthday">

        </header>

        <!-- HERO -->

        <section class="celebration">

            <div class="panda-glow"></div>

            <div class="hero-character">

                <div class="panda-halo"></div>

                <img

                    src="assets/images/panda/celebrate.png"

                    id="birthdayPanda"

                    class="birthday-panda"

                    alt="Panda">

                <img

                    src="assets/images/decorations/cake.png"

                    id="birthdayCake"

                    class="birthday-cake"

                    alt="Cake">

                <img

                    src="assets/images/decorations/gift-box.png"

                    id="giftBox"

                    class="birthday-gift"

                    alt="Gift">

            </div>

        </section>
        
        <!-- FOOTER -->

        <footer id="birthdayFooter">

    <span class="footer-line"></span>

    Crafted with

    <span class="footer-heart">

        ❤️

    </span>

    by

    <span class="footer-name">

        Jay

    </span>

    <span class="footer-line"></span>

    

</footer>

    </div>

</section>

    <div id="birthdayStar">⭐</div>
    <div id="portalGlow"></div>
    <div id="magicTransition"></div>

    <script src="js/script.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/scenes.js"></script>

</body>
</html>
